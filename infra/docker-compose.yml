version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: vedalink-db
    environment:
      POSTGRES_USER: vedalink
      POSTGRES_PASSWORD: vedalinkpassword
      POSTGRES_DB: vedalink_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
